<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius2</title>
  <style>
    *{margin: 0; padding: 0;}
    body{
      margin: 50px;
    }
    .box{
      width: 300px; height: 400px; border: 1px solid #000; border-radius: 50px; overflow: hidden;
      
    }
    .child{
      background-color: rgba(255, 238, 0, 0.89);
      height: 100%;
    }
  </style>
</head>
<body>
 <div class="box">
  <div class="child">Lorem ipsum dolor sit amet consectetur adipisicing elit. Veniam reiciendis corporis sapiente nihil quam, omnis fugiat non magnam illum earum.</div>
 </div>
</body>
</html>
