<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여백겹침현상</title>
</head>
<body>
  
  <header>
    <!-- 헤더 최상위컨테이너 
     여백, 테두리
    inner는 정렬-->
    <div class="inner">
      <div class="child child1">내용</div>
      <div class="child child2">내용</div>
    </div>
  </header>
<!-- 너비는 부모, 높이는 자식으로부터 온다 -->
  <style>
    /* reset */
    *{margin: 0; padding: 0;}
    body{background-color: #ccc;}
    header{
      background-color: #fff;
      padding: 1rem 0;
      border: 10px solid #000;
      min-height: 100px;
    }
    /* 정렬의 기준은 부모에게 주세요 */
    header .inner{
      background-color: #ccc;
      min-width: 600px;
      max-width: 1400px;
      /* width: auto; */
      width: 1000px;
      /* 박스모델의 블록레벨의 정렬은 margin:0 auto; 이용해 가운데 정렬 
      margin 바깥여백을 반으로 나눠서 왼쪽 오른쪽 적용*/
      width: 90%;
      margin: 0 auto;
      padding: 50px 0;

    }
    header .inner .child{
      padding: 1rem;
      margin: 0;}
    header .inner .child1{background-color: #86f;}
    header .inner .child2{background-color: #f68;}
  </style>

</body>
</html>
