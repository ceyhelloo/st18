<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>object-fit</title>
</head>
<body>
  <img src="../images/test-img.png" alt="exam1">
  <img src="../images/test-img.png" alt="exam2">
  <img src="../images/test-img.png" alt="exam3">
  <style>
    .exam1{width: 200px;}
    .exam2{height: 300px;}
    .exam3{
      background-color: #fcc;
      width: 400px; height: 200px;
      object-fit: fill;
      object-fit: contain;
      object-fit: cover;
    }
  </style>
</body>
</html>
