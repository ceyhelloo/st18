<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>positin sticky</title>
  <style>
    *{margin: 0; padding: 0;}
    .section:nth-child(odd){
      background-color: #68f
    }
    .section:nth-child(odd){
      background-color: #c68;
    }
    .section-title,
    .content-wrap{
      width: 80%;
      box-sizing: border-box;
      margin: 0 auto;
    }
    .section{
      overflow: hidden;
    }
    .section .section-title{
      background-color: #fff;
      /* line-height: 50px; */
      font-size: 1.5em;
      padding: 1em 2em;
      position: sticky;
      top: 50%;
    }
    .section .content-wrap{
      background-color: beige;
      height: 110vh;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .section.section$*4>p.section-title+.content-wrap -->
    <div class="section section1">
      <p class="section-title">section1</p>
      <div class="content-wrap"></div>
    </div>
    <div class="section section2">
      <p class="section-title">section2</p>
      <div class="content-wrap"></div>
    </div>
    <div class="section section3">
      <p class="section-title">section3</p>
      <div class="content-wrap"></div>
    </div>
    <div class="section section4">
      <p class="section-title">section4</p>
      <div class="content-wrap"></div>
    </div>
  </div>
</body>
</html>
