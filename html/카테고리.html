<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 - 목록연습</title>
</head>
<body>
   
  <nav>
     <!-- 
    ul 순서없는 목록
    li 목록 아이템
    -->
    <!-- 
    <태그>내용<태그>
    내용 : 텍스트 또는 태그
     -->
    <ul>
      <!-- 대분류 -->
      <li>BEST100</li>
      <!-- li*5 -->
      <li>NEW 10%</li>
      <li>dress</li>
      <li>outer</li>
      <li>top
        <ul>
          <!-- 중분류 -->
           <li>티</li>
           <li>셔츠</li>
           <li>블라우스</li>
        </ul>
      </li>
      <li>bottom
      <!--
      대분류 bottom에 속한 중분류 아이템이 2개
       -->
       <ul>
        <li>팬츠</li>
        <li>스커트</li>
       </ul>
      </li>
    </ul>
  </nav>
</body>
</html>
