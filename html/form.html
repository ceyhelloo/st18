<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form</title>
</head>
<body>
  <h1>폼태그</h1>
  <form action="">
    <fieldset>
      <!-- <legend>폼의 이름표</legend> -->
      <legend>폼의 이름표</legend>
      <p>
        <label for="">아이디   <input type="text"></label>
        <input type="text" placeholder="이름" id="name">
        <!-- 라벨쓸거면 안에 인풋을 넣어야함
         라벨은 인라인레벨이다 -->
        <label for="pwd">비밀번호  </label><input type="password" name="" id="pwd">
      </p>
      <p>
        <input type="number"><br>
        <input type="email" name="" id="">
      </p>
      <p>
        <input type="date" name="" id="">
        <input type="week">
      </p>
      <p>
        <input type="color">
      </p>
    </fieldset>
    <fieldset>
      <legend>선택상자</legend>
      <div>
        <label for="color1">빨강</label>
        <input type="checkbox" name="color" id="color1" value="1">
        <label for="color2">파랑</label>
        <input type="checkbox" name="color" id="color2" value="1">
        <label for="color3">노랑</label>
        <input type="checkbox" name="color" id="color3" value="1">
      </div>
    </fieldset>
    <fieldset>
      <legend>라디오버튼</legend>
      <label for="">빨강</label>
      <input type="radio" name="test" id="test1">
      <label for="">파랑</label>
      <input type="radio" name="test" id="test2">
      <label for="">노랑</label>
      <input type="radio" name="test" id="test3">
    </fieldset>
    <div>
      <input type="reset">
      <input type="submit">
      <input type="reset" value="취소">
      <input type="submit" value="확인">
      <input type="button" value="주소찾기">
      <input type="file" value="찾아보기">
    </div>
    <div>
      <button>제목</button>
      <button type="submit">확인</button>
      <button type="reset">취소</button>
      <button type="button"><img src="asset/logo.png" alt="" width="50"></button>
    </div>
    <style>
      button, [type="submit"]{background-color: #f00;}
    </style>
    <div>
      <select name="" id=""><option value="">패밀리사이트</option></select>
      <select name="" id=""><option value="https://www.naver.com">네이버</option></select>
      <select name="" id=""><option value="">구글</option></select>
      <select name="" id=""><option value="">다음</option></select>

      <select name="" id=""><option value="">패밀리사이트</option></select>
      <select name="" id=""><option value="https://www.naver.com">네이버</option></select>
      <select name="" id=""><option value="">구글</option></select>
      <select name="" id=""><option value="">다음</option></select>
    </div>
    <div>
      <textarea name="" id=""></textarea>
      <textarea name="" id="" readonly>가나다라마바사</textarea>
    </div>
  </form>

  <style>
    div{margin-bottom: 50px;}
  </style>
</body>
</html>
