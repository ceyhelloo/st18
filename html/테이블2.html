<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이블2</title>
</head>
<body>
  <!-- 4줄 5칸 -->
   <!-- tr*4>td*5{내용} -->
  <table border="1" width="80%">
  <tr>
    <!-- 1줄 -->
    <!-- rowspan = 줄 합치기 -->
    <td rowspan="2">내용</td>
    <!-- colspan = 칸 합치기 -->
    <td colspan="4">내용</td>
    <!-- <td>내용</td>
    <td>내용</td>
    <td>내용</td> -->
  </tr>
  <tr>
    <!-- 2줄 -->
    <!-- <td>내용</td> -->
    <td>현근</td>
    <td>현근</td>
    <td>현근</td>
    <td>현근</td>
  </tr>
  <tr>
    <!-- 3줄 -->
    <td rowspan="2">내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
  </tr>
  <tr>
    <!-- 4줄 -->
    <!-- <td>내용</td> -->
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
  </tr>
  </table>
  </body>
</html>
